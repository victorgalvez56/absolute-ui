name: Visual

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  visual:
    name: playwright · ladle story diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --dir apps/visual exec playwright install --with-deps chromium

      - name: Build Ladle
        run: pnpm --dir apps/ladle build

      - name: Run visual regression
        run: pnpm --dir apps/visual test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/visual/playwright-report/
          retention-days: 14
