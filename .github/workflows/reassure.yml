name: Reassure

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  perf:
    name: reassure · render-perf regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run perf (PR head)
        if: github.event_name == 'pull_request'
        run: pnpm --filter @absolute-ui/core perf

      - name: Post regression report
        if: github.event_name == 'pull_request'
        uses: callstack/reassure-action@main

      - name: Run perf (baseline)
        if: github.event_name == 'push'
        run: pnpm --filter @absolute-ui/core perf:baseline

      - name: Upload baseline artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: reassure-baseline
          path: packages/core/reassure-output.txt
          retention-days: 30
